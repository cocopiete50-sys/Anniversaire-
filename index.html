<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Joyeux Anniversaire Papi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; }

#txt {
position: fixed;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
pointer-events: none;
gap: 12px;
}

.line1 {
font-family: Georgia, serif;
font-size: clamp(22px, 7vw, 52px);
color: #fff;
letter-spacing: 0.05em;
opacity: 0;
animation: appear 1.2s ease 0.5s forwards;
text-shadow: 0 0 40px rgba(255,220,100,0.6);
}
.line2 {
font-family: Georgia, serif;
font-style: italic;
font-size: clamp(36px, 12vw, 88px);
color: #ffd87a;
letter-spacing: 0.03em;
opacity: 0;
animation: appear 1.2s ease 1.1s forwards;
text-shadow: 0 0 60px rgba(255,200,50,0.7), 0 0 120px rgba(255,180,0,0.3);
}
.line3 {
font-family: Georgia, serif;
font-size: clamp(18px, 5.5vw, 40px);
color: rgba(255,255,255,0.7);
letter-spacing: 0.12em;
opacity: 0;
animation: appear 1s ease 1.8s forwards;
text-transform: uppercase;
}

@keyframes appear {
from { opacity:0; transform: translateY(16px); }
to   { opacity:1; transform: translateY(0); }
}
</style>

</head>
<body>

<canvas id="c"></canvas>

<div id="txt">
  <span class="line1">Joyeux Anniversaire</span>
  <span class="line2">Papi</span>
  <span class="line3">🎂 &nbsp; avec tout notre amour &nbsp; 🎂</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- STARS ---
const stars = Array.from({length: 120}, () => ({
  x: Math.random(),
  y: Math.random(),
  r: 0.3 + Math.random() * 1.2,
  a: 0.3 + Math.random() * 0.7,
  speed: 0.004 + Math.random() * 0.008,
  phase: Math.random() * Math.PI * 2
}));

function drawStars(t) {
  stars.forEach(s => {
    const a = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,240,${a})`;
    ctx.fill();
  });
}

// --- FIREWORKS ---
class Particle {
  constructor(x, y, hue) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 5;
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.alpha = 1;
    this.hue = hue;
    this.sat = 60 + Math.random() * 40;
    this.life = 0.018 + Math.random() * 0.012;
    this.r = 1.5 + Math.random() * 2;
    this.gravity = 0.06;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.97;
    this.alpha -= this.life;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue},${this.sat}%,70%,${this.alpha})`;
    ctx.fill();
  }
  dead() { return this.alpha <= 0; }
}

class Rocket {
  constructor() { this.reset(); }
  reset() {
    this.x = W * (0.15 + Math.random() * 0.7);
    this.y = H;
    this.tx = W * (0.1 + Math.random() * 0.8);
    this.ty = H * (0.1 + Math.random() * 0.45);
    const dx = this.tx - this.x, dy = this.ty - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const spd = 7 + Math.random() * 5;
    this.vx = (dx / dist) * spd;
    this.vy = (dy / dist) * spd;
    this.hue = Math.random() * 360;
    this.trail = [];
    this.exploded = false;
  }
  update(particles) {
    if (this.exploded) return true;
    this.trail.push({x: this.x, y: this.y, a: 0.7});
    if (this.trail.length > 12) this.trail.shift();
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.08;
    if (this.vy >= 0 || Math.abs(this.y - this.ty) < 12) {
      this.explode(particles);
      return true;
    }
    return false;
  }
  explode(particles) {
    this.exploded = true;
    const count = 80 + Math.floor(Math.random() * 60);
    for (let i = 0; i < count; i++) particles.push(new Particle(this.x, this.y, this.hue));
  }
  draw() {
    this.trail.forEach((p, i) => {
      const a = (i / this.trail.length) * p.a;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue},80%,80%,${a})`;
      ctx.fill();
    });
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${this.hue},90%,90%)`;
    ctx.fill();
  }
}

let particles = [];
let rockets = [];
let lastRocket = 0;
let rocketInterval = 800;

function loop(t) {
  requestAnimationFrame(loop);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#03060f');
  sky.addColorStop(1, '#0a0520');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  drawStars(t * 0.001);

  // Rockets
  if (t - lastRocket > rocketInterval) {
    rockets.push(new Rocket());
    lastRocket = t;
    rocketInterval = 600 + Math.random() * 1000;
  }
  rockets = rockets.filter(r => {
    r.draw();
    return !r.update(particles);
  });

  // Particles
  particles = particles.filter(p => {
    p.update(); p.draw(); return !p.dead();
  });
}

requestAnimationFrame(loop);

// Burst at start
setTimeout(() => {
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const x = W * (0.25 + Math.random() * 0.5);
      const y = H * (0.15 + Math.random() * 0.3);
      const hue = Math.random() * 360;
      for (let j = 0; j < 120; j++) particles.push(new Particle(x, y, hue));
    }, i * 300);
  }
}, 1200);
</script>

</body>
</html>
