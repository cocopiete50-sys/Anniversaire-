<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Joyeux Anniversaire Papi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
canvas { display:block; position:fixed; inset:0; }

#overlay {
position: fixed;
inset: 0;
background: #000;
pointer-events: none;
animation: fadeOverlay 1.6s ease forwards;
z-index: 10;
}
@keyframes fadeOverlay {
0%   { opacity: 1; }
100% { opacity: 0; }
}

#txt {
position: fixed;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
pointer-events: none;
z-index: 5;
}

.line1 {
font-family: Georgia, ‘Times New Roman’, serif;
font-size: clamp(18px, 5.5vw, 38px);
color: rgba(255,255,255,0.9);
letter-spacing: 0.12em;
opacity: 0;
animation: slideUp 1s cubic-bezier(0.22,1,0.36,1) 1s forwards;
text-shadow: 0 0 30px rgba(255,220,120,0.4);
}

.line2 {
font-family: Georgia, ‘Times New Roman’, serif;
font-style: italic;
font-size: clamp(64px, 20vw, 130px);
color: #ffd87a;
letter-spacing: 0.02em;
line-height: 1;
margin-top: 6px;
opacity: 0;
animation: bigReveal 1.2s cubic-bezier(0.22,1,0.36,1) 1.5s forwards;
text-shadow:
0 0 40px rgba(255,210,80,0.9),
0 0 80px rgba(255,180,30,0.5),
0 0 140px rgba(255,150,0,0.25);
}

@keyframes slideUp {
from { opacity:0; transform: translateY(20px); }
to   { opacity:1; transform: translateY(0); }
}

@keyframes bigReveal {
from { opacity:0; transform: scale(0.6) translateY(30px); filter: blur(12px); }
to   { opacity:1; transform: scale(1) translateY(0); filter: blur(0); }
}

/* Pulsing glow on Papi */
.line2 {
animation: bigReveal 1.2s cubic-bezier(0.22,1,0.36,1) 1.5s forwards,
glowPulse 3s ease-in-out 3s infinite;
}
@keyframes glowPulse {
0%,100% { text-shadow: 0 0 40px rgba(255,210,80,0.9), 0 0 80px rgba(255,180,30,0.5), 0 0 140px rgba(255,150,0,0.25); }
50%     { text-shadow: 0 0 60px rgba(255,220,100,1),  0 0 120px rgba(255,190,50,0.8), 0 0 200px rgba(255,160,0,0.4); }
}
</style>

</head>
<body>

<div id="overlay"></div>
<canvas id="c"></canvas>

<div id="txt">
  <span class="line1">Joyeux Anniversaire</span>
  <span class="line2">Papi</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Stars
const stars = Array.from({length:150}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.3 + Math.random() * 1.4,
  a: 0.2 + Math.random() * 0.7,
  sp: 0.002 + Math.random() * 0.006,
  ph: Math.random() * Math.PI * 2
}));
function drawStars(t) {
  stars.forEach(s => {
    const a = s.a * (0.4 + 0.6 * Math.sin(t * s.sp * 60 + s.ph));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,240,${a})`;
    ctx.fill();
  });
}

// Particles
class P {
  constructor(x, y, hue, big) {
    const a = Math.random() * Math.PI * 2;
    const spd = big ? (2 + Math.random() * 7) : (1 + Math.random() * 4);
    this.x=x; this.y=y;
    this.vx = Math.cos(a)*spd; this.vy = Math.sin(a)*spd;
    this.hue = hue + (Math.random()-0.5)*30;
    this.alpha = 1;
    this.decay = 0.013 + Math.random() * 0.01;
    this.r = big ? (1.8 + Math.random()*2.5) : (1 + Math.random()*1.8);
    this.g = 0.05;
    // tail
    this.px = x; this.py = y;
  }
  update() {
    this.px = this.x; this.py = this.y;
    this.x += this.vx; this.y += this.vy;
    this.vy += this.g; this.vx *= 0.97;
    this.alpha -= this.decay;
  }
  draw() {
    ctx.beginPath();
    ctx.moveTo(this.px, this.py);
    ctx.lineTo(this.x, this.y);
    ctx.strokeStyle = `hsla(${this.hue},90%,72%,${this.alpha * 0.6})`;
    ctx.lineWidth = this.r * 0.6;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue},90%,80%,${this.alpha})`;
    ctx.fill();
  }
  dead() { return this.alpha <= 0; }
}

// Rockets
class Rocket {
  constructor(forced) {
    this.x = W * (0.1 + Math.random() * 0.8);
    this.y = H + 5;
    this.tx = W * (0.1 + Math.random() * 0.8);
    this.ty = H * (forced ? (0.08 + Math.random()*0.25) : (0.1 + Math.random()*0.4));
    const dx = this.tx-this.x, dy = this.ty-this.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    const spd = 9 + Math.random()*5;
    this.vx = dx/d*spd; this.vy = dy/d*spd;
    this.hue = Math.random()*360;
    this.trail = [];
    this.done = false;
  }
  update(parts) {
    if(this.done) return true;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length > 14) this.trail.shift();
    this.x+=this.vx; this.y+=this.vy; this.vy+=0.1;
    if(this.vy >= -0.5 || Math.abs(this.y-this.ty)<10) {
      const n = 100 + Math.floor(Math.random()*80);
      for(let i=0;i<n;i++) parts.push(new P(this.x,this.y,this.hue,true));
      // shockwave ring
      rings.push({x:this.x,y:this.y,r:0,max:80+Math.random()*60,hue:this.hue,a:0.8});
      spawnWord(this.x, this.y - 30, this.hue);
      this.done=true; return true;
    }
    return false;
  }
  draw() {
    for(let i=0;i<this.trail.length;i++){
      const a = (i/this.trail.length)*0.8;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, 2.5, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${this.hue},80%,90%,${a})`;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(this.x,this.y,3.5,0,Math.PI*2);
    ctx.fillStyle = `hsl(${this.hue},90%,95%)`;
    ctx.fill();
  }
}

// Floating words
const WORDS = ["Bonne santé", "Tout le bonheur", "Longue vie", "Beaucoup d'amour"];
let words = [];

function spawnWord(x, y, hue) {
  if (Math.random() > 0.25) return; // ~1 sur 4
  const text = WORDS[Math.floor(Math.random() * WORDS.length)];
  words.push({ x, y, text, hue, alpha: 0, vy: -0.55, life: 0 });
}

function updateWords() {
  words = words.filter(w => {
    w.life++;
    w.alpha = w.life < 25 ? w.life / 25 : Math.max(0, 1 - (w.life - 25) / 70);
    w.y += w.vy;
    if (w.alpha <= 0) return false;
    const size = Math.min(W * 0.042, 18);
    ctx.save();
    ctx.font = `italic ${size}px Georgia, serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = `hsla(${w.hue},90%,70%,${w.alpha})`;
    ctx.shadowBlur = 18;
    ctx.fillStyle = `hsla(${w.hue},85%,85%,${w.alpha})`;
    ctx.fillText(w.text, w.x, w.y);
    ctx.restore();
    return true;
  });
}

// Shockwave rings
let rings = [];
function updateRings() {
  rings = rings.filter(r => {
    r.r += 4; r.a -= 0.025;
    if(r.a <= 0) return false;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = `hsla(${r.hue},80%,80%,${r.a})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    return true;
  });
}

let parts = [], rockets = [];
let lastR = 0, interval = 700;

function bigBang() {
  // 5 simultaneous rockets across the screen
  const positions = [0.12, 0.28, 0.5, 0.72, 0.88];
  positions.forEach((px, i) => {
    setTimeout(() => {
      const x = W * px;
      const y = H * (0.1 + Math.random() * 0.3);
      const hue = (i * 72 + Math.random()*30) % 360;
      const n = 130;
      for(let j=0;j<n;j++) parts.push(new P(x,y,hue,true));
      rings.push({x,y,r:0,max:100,hue,a:0.9});
    }, i * 160);
  });
}

function loop(t) {
  requestAnimationFrame(loop);

  // Sky
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#020510');
  sky.addColorStop(1,'#08041a');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  drawStars(t * 0.001);

  // Continuous rockets
  if(t - lastR > interval) {
    rockets.push(new Rocket(false));
    lastR = t;
    interval = 500 + Math.random() * 900;
  }

  rockets = rockets.filter(r => { r.draw(); return !r.update(parts); });
  parts   = parts.filter(p => { p.update(); p.draw(); return !p.dead(); });
  updateRings();
  updateWords();
}

requestAnimationFrame(loop);

// Opening bang after overlay fades
setTimeout(bigBang, 800);
</script>

</body>
</html>
